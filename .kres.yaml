---
kind: common.Build
spec:
  ignoredPaths:
    - _out/
---
kind: golang.Generate
spec:
  versionPackagePath: internal/version
---
kind: golang.Build
spec:
  outputs:
    linux-amd64:
      GOOS: linux
      GOARCH: amd64
    linux-arm64:
      GOOS: linux
      GOARCH: arm64
---
kind: common.Image
name: image-talos-exporter
spec:
  extraEnvironment:
    PLATFORM: linux/amd64,linux/arm64
  entrypoint: /talos-exporter
---
kind: auto.CustomSteps
spec:
  steps:
    - name: e2e-test
      toplevel: true
      dependants:
        - coverage
    - name: talosctl
      dependants:
        - e2e-test
---
kind: custom.Step
name: e2e-test
spec:
  makefile:
    enabled: true
    phony: true
    depends:
      - talosctl
    variables:
      - name: TALOS_VERSION
        defaultValue: 1.13.5
    script:
      - 'E2E_PLATFORM=linux/amd64; case "$$(uname -m)" in arm64|aarch64) E2E_PLATFORM=linux/arm64;; esac; $(MAKE) image-talos-exporter PUSH=true PLATFORM=$${E2E_PLATFORM}'
      - docker pull $(REGISTRY)/$(USERNAME)/talos-exporter:$(IMAGE_TAG)
      - '$(ARTIFACTS)/talosctl cluster create docker --name=talos-exporter-e2e --kubernetes-version=v1.35.0 --talosconfig-destination=$(ARTIFACTS)/talosconfig --state=$(ARTIFACTS)/cluster-state --subnet=10.5.1.0/24'
      - '$(ARTIFACTS)/talosctl kubeconfig $(ARTIFACTS)/kubeconfig --talosconfig=$(ARTIFACTS)/talosconfig --nodes=10.5.1.2'
      - docker run --rm --net=host --cap-drop=all --cap-add=DAC_OVERRIDE --userns=host -v /var/run:/var/run -v $(PWD)/$(ARTIFACTS)/:/out/ $(REGISTRY)/$(USERNAME)/talos-exporter:$(IMAGE_TAG) /talos-exporter --talosconfig=/out/talosconfig --listen=:9104 --aggregate &
      - sleep 3
      - go test -tags=integration -c -o $(ARTIFACTS)/e2e.test ./internal/integration/
      - 'EXPORTER_ADDR=http://localhost:9104/metrics $(ARTIFACTS)/e2e.test -test.v -test.run TestExporterServesMetrics'
      - kill %1 || true
      - '$(ARTIFACTS)/talosctl cluster destroy --name=talos-exporter-e2e --state=$(ARTIFACTS)/cluster-state'
      - rm -f $(ARTIFACTS)/talosconfig $(ARTIFACTS)/kubeconfig $(ARTIFACTS)/e2e.test
  ghaction:
    enabled: true
    condition: on-pull-request
    parallelJob:
      name: e2e-test
      runnerGroup: large
    environment:
      REGISTRY: registry.dev.siderolabs.io
---
kind: custom.Step
name: talosctl
spec:
  makefile:
    enabled: true
    phony: true
    depends:
      - $(ARTIFACTS)
    variables:
      - name: TALOS_VERSION
        defaultValue: 1.13.5
    script:
      - |
        curl -Lo $(ARTIFACTS)/talosctl https://github.com/siderolabs/talos/releases/download/v$(TALOS_VERSION)/talosctl-$(OPERATING_SYSTEM)-$(GOARCH)
        chmod +x $(ARTIFACTS)/talosctl
---
kind: custom.Step
name: tools
spec:
  makefile:
    enabled: true
    phony: true
    depends:
      - talosctl
  ghaction:
    enabled: true
    condition: on-pull-request
---
kind: golang.UnitTests
spec:
  extraArgs: "-tags=integration"
---
kind: service.CodeCov
spec:
  targetThreshold: 50

